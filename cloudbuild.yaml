steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/distrik-bunyi:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/distrik-bunyi:latest'
      - '.'
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/distrik-bunyi:$COMMIT_SHA']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/distrik-bunyi:latest']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'distrik-bunyi'
      - '--image=gcr.io/$PROJECT_ID/distrik-bunyi:$COMMIT_SHA'
      - '--region=asia-southeast2'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--max-instances=10'
      - '--set-env-vars=NODE_ENV=production'

images:
  - 'gcr.io/$PROJECT_ID/distrik-bunyi:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/distrik-bunyi:latest'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
